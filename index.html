<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchlist</title>
    <!--
      Anti-flash skript — spouští se synchronně PŘED prvním vykreslením.
      Nastaví správné téma dřív, než se načte jakýkoliv CSS nebo React,
      takže uživatel nikdy neuvidí záblesk špatného tématu (FOUT).

      try/catch chrání před nedostupným localStorage (incognito, sandboxed iframe).
    -->
    <script>
      try {
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
